name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast feedback on every push: fmt + clippy + test on Linux.
  linux:
    name: linux / stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo build --all-targets
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  # Cross-platform test matrix (stable only, skip clippy to save time).
  test:
    name: test (${{ matrix.os }} / stable)
    needs: linux
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test --all-targets

  # MSRV: pin to 1.87. Three constraints drove this:
  #   1. The shipped Cargo.lock is format v4 → requires Cargo >= 1.78.
  #   2. A dev-dep (`clap_lex 1.1.0`) declares `edition = "2024"`, which
  #      Cargo only learned to parse starting in 1.81.
  #   3. `examples/ai_summary_demo.rs` uses `Integer::is_multiple_of`,
  #      stabilized in Rust 1.87, and clippy's `incompatible_msrv` lint
  #      (with `-D warnings` on the stable job) refuses to let the
  #      declared MSRV be lower than that.
  # Keep in sync with `package.rust-version` in Cargo.toml.
  msrv:
    name: MSRV (1.87 / ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
