name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Fast feedback: fmt + clippy on stable + beta, all targets.
  # ---------------------------------------------------------------------------
  lint:
    name: fmt + clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt --check
        run: cargo fmt --all -- --check

      - name: clippy (lib + tests + examples + benches)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: doc build
        run: cargo doc --no-deps --all-features

  # ---------------------------------------------------------------------------
  # Test matrix: every supported host triple × stable / beta.
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }} / rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@${{ matrix.rust }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: cargo build (debug)
        run: cargo build --all-targets --all-features

      - name: cargo test
        run: cargo test --all-targets --all-features

      - name: cargo build (release)
        run: cargo build --release --all-features

  # ---------------------------------------------------------------------------
  # Minimum Supported Rust Version (MSRV).
  # Cargo.toml doesn't pin MSRV yet, so we use a conservative 1.70 which is
  # older than any toolchain we test against.
  # ---------------------------------------------------------------------------
  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.70
        uses: dtolnay/rust-toolchain@1.70
      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets

  # ---------------------------------------------------------------------------
  # Release packaging: build release binaries for every host triple and
  # upload them as a single `release-${{ github.sha }}` artifact. Triggered
  # on tags starting with `v` so manual releases can pull the binary set
  # straight from the workflow run.
  # ---------------------------------------------------------------------------
  release-build:
    name: release binary (${{ matrix.target }})
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux cross toolchain
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add cross target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo build --release
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin type_keys --bin gamepad_demo --bin live_e2e --bin live_kbd

      - name: Package Linux binaries
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/type_keys release/ || true
          cp target/${{ matrix.target }}/release/gamepad_demo release/ || true
          cp target/${{ matrix.target }}/release/live_e2e release/ || true
          cp target/${{ matrix.target }}/release/live_kbd release/ || true
          strip release/* 2>/dev/null || true
          tar -czf android-hid-connect-${{ matrix.target }}.tar.gz -C release .

      - name: Package macOS binaries
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/type_keys release/ || true
          cp target/${{ matrix.target }}/release/gamepad_demo release/ || true
          cp target/${{ matrix.target }}/release/live_e2e release/ || true
          cp target/${{ matrix.target }}/release/live_kbd release/ || true
          strip release/* 2>/dev/null || true
          tar -czf android-hid-connect-${{ matrix.target }}.tar.gz -C release .

      - name: Package Windows binaries
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/type_keys.exe release/ || true
          cp target/${{ matrix.target }}/release/gamepad_demo.exe release/ || true
          cp target/${{ matrix.target }}/release/live_e2e.exe release/ || true
          cp target/${{ matrix.target }}/release/live_kbd.exe release/ || true
          7z a android-hid-connect-${{ matrix.target }}.zip release/*

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-hid-connect-${{ matrix.target }}
          path: |
            android-hid-connect-${{ matrix.target }}.tar.gz
            android-hid-connect-${{ matrix.target }}.zip
          if-no-files-found: warn
          retention-days: 14
