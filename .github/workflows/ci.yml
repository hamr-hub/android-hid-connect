name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast feedback on every push: fmt + clippy + test on Linux.
  linux:
    name: linux / stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo build --all-targets
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  # Cross-platform test matrix (stable only, skip clippy to save time).
  test:
    name: test (${{ matrix.os }} / stable)
    needs: linux
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test --all-targets

  # MSRV: pin to 1.78 — the minimum that can read the v4 lock file format
  # the project already ships with (Cargo 1.78+). This is the oldest toolchain
  # that still understands the lockfile generated by our current stable
  # toolchain; keep it in sync with `package.rust-version` in Cargo.toml.
  msrv:
    name: MSRV (1.78 / ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
